<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 420px;
        font-family: sans-serif;
        padding: 16px;
      }
      .section {
        margin-bottom: 16px;
      }
      label {
        font-size: 12px;
        color: #666;
        display: block;
        margin-bottom: 4px;
      }
      input[type='text'] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 6px 10px;
        font-size: 13px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      button {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }
      #search-btn {
        background: #1a73e8;
        color: white;
      }
      #save-config {
        background: #f1f3f4;
        color: #333;
      }
      .result-item {
        border-bottom: 1px solid #eee;
        padding: 10px 0;
        font-size: 13px;
      }
      .rank {
        font-size: 11px;
        color: #888;
        margin-bottom: 2px;
      }
      .orig {
        color: #bbb;
      }
      a {
        color: #1a0dab;
        text-decoration: none;
        display: block;
        font-weight: bold;
        margin-bottom: 2px;
      }
      a:hover {
        text-decoration: underline;
      }
      p {
        margin: 0;
        color: #545454;
        font-size: 12px;
      }
      .error {
        color: red;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <label>API Key</label>
      <input type="text" id="api-key" placeholder="AIza..." />
      <label style="margin-top: 8px">Search Engine ID (cx)</label>
      <input type="text" id="cx" placeholder="xxxxxxxxxx" />
      <div class="row">
        <button id="save-config">設定を保存</button>
      </div>
    </div>
    <div class="section">
      <label>検索クエリ</label>
      <div class="row">
        <input type="text" id="query" placeholder="TypeScript chrome extension" />
        <button id="search-btn" style="flex: 0 0 60px">検索</button>
      </div>
    </div>
    <div id="results"></div>
    <script src="dist/popup.js" type="module"></script>
  </body>
</html>

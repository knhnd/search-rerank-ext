<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 300px;
        font-family: sans-serif;
        padding: 16px;
      }
      h2 {
        font-size: 15px;
        margin: 0 0 12px;
      }
      #status {
        font-size: 13px;
        margin-bottom: 12px;
      }
      #rerank-btn {
        width: 100%;
        padding: 10px;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }
      #rerank-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      #rerank-btn:hover:not(:disabled) {
        background: #1557b0;
      }
    </style>
  </head>
  <body>
    <h2>🔍 Search ReRank Extension</h2>
    <div id="status">読み込み中...</div>
    <button id="rerank-btn" disabled>並び替えを実行</button>
    <script src="dist/popup.js" type="module"></script>
  </body>
</html>
